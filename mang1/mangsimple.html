<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="padding-top: 50px;">
    <input type="text" id="textval">
    <input type="button" value="add" id="btadd" onclick="add_element_to_array()">
    <input type="button" value="display" id="btdis" onclick="display_array()">
    <div id="result"></div>
</body>
<script>
let x =0;
let array = Array();
function add_element_to_array(){
array[x] = document.getElementById("textval").value;
alert("element:" + array[x] + "add at index"+ x);
x++;
document.getElementById("textval").value ="";   
}
function display_array(){
    let e = "<hr/>";
    for (let i = 0; i< array.length; i++){
        e += "elemet" + i +"="+array[i]+ "<br/>";
        
    }
    document.getElementById("result").innerHTML = e;
}
</script>   

</html>
